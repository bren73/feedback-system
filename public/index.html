<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourFeedback.biz - Customer Feedback System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .container { max-width: 600px; }
    .logo { height: 180px; margin-bottom: 24px; }
    h1 { color: #2E7D32; margin-bottom: 16px; font-size: 36px; }
    h1 span { color: #FF6F00; }
    p { color: #666; font-size: 18px; margin-bottom: 32px; }
    .btn { display: inline-block; padding: 16px 32px; background: #FF6F00; color: white; text-decoration: none; border-radius: 12px; font-size: 18px; font-weight: 600; transition: transform 0.2s; margin: 8px; }
    .btn:hover { transform: scale(1.05); }
    .admin-link { margin-top: 40px; color: #666; font-size: 14px; }
    .admin-link a { color: #FF6F00; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/assets/logo.jpg" alt="Logo" class="logo">
    <h1>YourFeedback<span>.biz</span></h1>
    <p>Customer feedback made simple.</p>
    
    <div class="admin-link">
      <a href="/admin-login.html">Business Login</a>
    </div>
  </div>
</body>
</html>

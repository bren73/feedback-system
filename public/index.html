<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YourFeedback.biz - Customer Feedback System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .container { max-width: 600px; }
    h1 { color: #2E7D32; margin-bottom: 16px; font-size: 36px; }
    h1 span { color: #FF6F00; }
    p { color: #666; font-size: 18px; margin-bottom: 32px; }
    .btn { display: inline-block; padding: 16px 32px; background: #FF6F00; color: white; text-decoration: none; border-radius: 12px; font-size: 18px; font-weight: 600; transition: transform 0.2s; }
    .btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Your Feedback System</h1>
    <p>Customer feedback made simple.</p>
    <a href="/admin" class="btn">Business Login</a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - YourFeedback</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h1 { color: #333; margin-bottom: 8px; text-align: center; }
    .subtitle { color: #666; text-align: center; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
    .form-group input { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; }
    .form-group input:focus { outline: none; border-color: #FF6F00; }
    .btn { width: 100%; padding: 16px; background: #FF6F00; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    .error { color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>YourFeedback. biz</h1>
    <p class="subtitle">Business Dashboard Login</p>
    
    <div class="error" id="error"></div>
    
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password">
    </div>
    
    <button class="btn" onclick="login()">Login</button>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('business_token', data.token);
          localStorage.setItem('business_name', data.business.name);
          window.location.href = '/admin/dashboard.html';
        } else {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.style.display = 'block';
        }
      } catch (e) {
        errorEl.textContent = 'Error connecting to server';
        errorEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
